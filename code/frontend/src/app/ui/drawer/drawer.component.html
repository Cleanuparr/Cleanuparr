@if (visible()) {
  <!-- Backdrop dismissal is pointer-only sugar; keyboard users dismiss via the Escape HostListener. -->
  <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
  <div class="drawer-backdrop" (click)="onBackdropClick($event)">
    <aside
      class="drawer"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="title() ? titleId : null"
      [attr.aria-label]="title() ? null : 'Drawer'"
      cdkTrapFocus
      [cdkTrapFocusAutoCapture]="false"
    >
      @if (title()) {
        <header class="drawer__header">
          <h2 [id]="titleId" class="drawer__title">{{ title() }}</h2>
          <button class="drawer__close" type="button" (click)="close()" aria-label="Close">&times;</button>
        </header>
      }
      <div class="drawer__body">
        <ng-content />
      </div>
      <footer class="drawer__footer">
        <ng-content select="[drawer-footer]" />
      </footer>
    </aside>
  </div>
}
