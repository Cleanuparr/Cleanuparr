<app-page-header
  title="Orphaned Files Cleaner"
  subtitle="Move files not associated with any active torrent to a dedicated folder"
/>

@if (loadError()) {
  <app-empty-state
    icon="tablerPlugConnectedX"
    heading="Could not connect to server"
    description="Failed to load settings. Please check that the server is running and try again."
  >
    <app-button variant="primary" size="sm" (clicked)="retry()">
      Retry
    </app-button>
  </app-empty-state>
} @else if (loader.showSpinner()) {
  <app-loading-state message="Loading settings..." />
} @else if (!loader.loading()) {
<div class="settings-form">

  <app-card header="Configuration">
    <div class="form-stack">
      <app-toggle
        label="Enabled"
        [(checked)]="enabled"
        hint="When enabled, the job scans your directories and moves files not tracked by any torrent"
      />
      @if (enabled()) {
        <app-toggle
          label="Advanced Scheduling"
          [(checked)]="useAdvancedScheduling"
          hint="Choose between basic scheduling or advanced cron expression"
        />
        @if (useAdvancedScheduling()) {
          <app-input
            label="Cron Expression"
            placeholder="0 0 2 * * ?"
            [(value)]="cronExpression"
            hint="Enter a valid Quartz cron expression (e.g., &quot;0 0 2 * * ?&quot; runs every day at 2 AM)"
            [error]="cronError()"
          />
        } @else {
          <div class="form-row">
            <app-select
              label="Schedule Unit"
              [options]="scheduleUnitOptions"
              [(value)]="scheduleUnit"
              hint="Choose the time unit for the schedule"
            />
            <app-select
              label="Every"
              [options]="scheduleIntervalOptions()"
              [(value)]="scheduleEvery"
              hint="How often the job should run"
            />
          </div>
        }
      }
    </div>
  </app-card>

  @if (enabled()) {
    <app-card header="Directories">
      <div class="form-stack">
        <app-chip-input
          label="Scan Directories"
          placeholder="Add directory path..."
          hint="Absolute paths to scan for orphaned files. Each top-level entry is checked against your active torrents."
          [(items)]="scanDirectories"
          [error]="scanDirError()"
        />
        <app-input
          label="Orphaned Directory"
          placeholder="/mnt/data/orphaned"
          hint="Where orphaned files are moved. Leave empty to log only without moving."
          [(value)]="orphanedDirectory"
        />
      </div>
    </app-card>

    <app-card header="Filters &amp; Safety">
      <div class="form-stack">
        <app-chip-input
          label="Exclude Patterns"
          placeholder="Add glob pattern (e.g. *.nfo)..."
          hint="File or folder names matching these patterns are never considered orphaned (e.g. *.nfo, .DS_Store)"
          [(items)]="excludePatterns"
        />
        <div class="form-row">
          <app-number-input
            label="Min File Age"
            suffix="min"
            [min]="0"
            hint="Skip files or folders modified less than this many minutes ago. Protects active downloads."
            [(value)]="minFileAgeMinutes"
          />
          <app-number-input
            label="Max Moves per Run"
            [min]="1"
            hint="Safety cap: stop after moving this many entries per run to prevent accidental mass moves."
            [(value)]="maxOrphanedFilesToProcess"
          />
        </div>
        <app-number-input
          label="Purge Orphaned After"
          suffix="days"
          [min]="1"
          hint="Permanently delete entries from the Orphaned Directory after this many days. Leave empty to keep them indefinitely."
          [(value)]="emptyAfterXDays"
        />
      </div>
    </app-card>

    <app-card header="Path Remapping">
      <div class="form-stack">
        <app-input
          label="Download Directory Source"
          placeholder="/downloads"
          hint="Path prefix reported by the download client (useful when paths differ between Docker container and host)"
          [(value)]="downloadDirectorySource"
        />
        <app-input
          label="Download Directory Target"
          placeholder="/mnt/data/downloads"
          hint="Corresponding path prefix on the local filesystem"
          [(value)]="downloadDirectoryTarget"
        />
      </div>
    </app-card>
  }

  <div class="form-actions">
    <app-button
      variant="primary"
      [glowing]="dirty()"
      [loading]="saving()"
      [disabled]="saving() || saved() || hasErrors() || !dirty()"
      (clicked)="save()"
    >
      {{ saved() ? 'Saved!' : 'Save Settings' }}
    </app-button>
  </div>

</div>
}
