<app-card header="Event activity" subtitle="Events by type over the selected window">
  <div class="stats">
    <div class="stats__windows" role="group" aria-label="Time window">
      @for (w of windows; track w.hours) {
        <button
          type="button"
          class="stats__window"
          [class.stats__window--active]="window() === w.hours"
          [attr.aria-pressed]="window() === w.hours"
          (click)="setWindow(w.hours)"
        >
          {{ w.label }}
        </button>
      }
    </div>

    @if (hasError()) {
      <div class="stats__error">
        <span>Couldn't load event activity.</span>
        <button type="button" class="stats__retry" (click)="retry()">Retry</button>
      </div>
    } @else if (hasActivity()) {
      <div class="stats__chart" [class.stats__chart--loading]="isLoading()">
        <vis-xy-container [data]="data()" [height]="200" [duration]="duration" [margin]="chartMargin">
          <vis-area [x]="x" [y]="y()" [color]="currentColor()" [opacity]="0.14" [duration]="duration" />
          <vis-line [x]="x" [y]="y()" [color]="currentColor()" [lineWidth]="2" [duration]="duration" />
          <vis-axis
            type="x"
            [numTicks]="5"
            [tickFormat]="xTickFormat"
            [gridLine]="false"
            [tickLine]="false"
            [domainLine]="false"
          />
          <vis-crosshair [x]="x" [y]="y()" [color]="currentColor()" [template]="tooltip" />
          <vis-tooltip />
        </vis-xy-container>
        <vis-bullet-legend class="stats__legend" [items]="legendItems()" [onLegendItemClick]="onLegendClick" />
      </div>
    } @else {
      <p class="stats__empty">No events in this window.</p>
    }
  </div>
</app-card>
